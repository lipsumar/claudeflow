name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - run: corepack enable

      - run: yarn install --immutable
      - run: yarn build
      - run: yarn typecheck
      - run: yarn build:sandbox
      - run: yarn test --run
